# Version-dependent build
# -----------------------
#
# When updating the version of these programs/libraries, please look into
# the build rule first: In one way or another, the version string becomes
# necessary during their build and must be accounted for.
bzip2-version = 1.0.8

# PEM Certificate File
# --------------------
#
# This file should be shipped with operating systems and can be found in
# '/etc/ssl/cert.pem' (which may be a symbolic link to its actual
# location). The current version was taken from an up-to-date ArchLinux at
# the date that is also equal to the version.
certpem-version = 2025-02-10

# PatchELF
# --------
#
# PatchELF 0.15 requires a C++ compiler with the 2017 standard. There are
# still systems that don't have such compilers and there hasn't been any
# Maneage-related bug in PatchELF that would need newer versions. So we'll
# stick to this version until the stdc++17 compilers are more commonly
# supported.
patchelf-version = 0.13

# Dash
# ----
#
# Dash 0.5.13.1 causes the build of pkg-config to put the building of
# Maneage within apptainer to go into the background! Forcing the user to
# run 'fg' to continue the build. When updating to a later version, be
# careful about this: that it does not cause this issue.
dash-version = 0.5.12

# Not working with C23
# --------------------
#
# As of GCC 15.1, the default C standard has been changed from C17 to C23
# and the following software cannot be built with C23. So we have added
# '-std=$(GNU_STD_OLD)' to the CFLAGS environment variable in their build
# rules. A test is done in 'configure.sh' to see if the host compiler has
# 'gnu17' and if not, to use 'gnu99'.  After updating a package's version
# (and if you have GCC 15.1 or later) first remove '-std=$(GNU_STD_OLD)'
# and then try the build. If it works, move the software package back up to
# the main list before making a commit.
gmp-version = 6.3.0
file-version = 5.46
ncurses-version = 6.5
pkgconfig-version = 0.29.2

# GCC
# ---
#
# There is a version-specific 'sed -e' fix for a bug in this version of GCC
# that should no longer be necessary in future versions.
gcc-version = 15.2.0




